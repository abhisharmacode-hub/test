# Nginx site config for the GCP VM.
# Copy to /etc/nginx/sites-available/app, then:
#   sudo ln -s /etc/nginx/sites-available/app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace:  support.example.com  -> your real subdomain
# Cloudflare sits in front (orange cloud) with SSL mode "Full (strict)", so the
# origin terminates TLS with a Cloudflare Origin Certificate.

# ── Restore the real visitor IP from Cloudflare ───────────────────────────────
# Without this, Nginx + the app see Cloudflare's IP, which would break the
# admin/agent IP allow-list and rate limiting. CF-Connecting-IP carries the true
# client IP. (Refresh the ranges from https://www.cloudflare.com/ips/)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# Redirect any plain HTTP to HTTPS (Cloudflare also does this, belt-and-braces).
server {
    listen 80;
    server_name support.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name support.example.com;

    # Cloudflare Origin Certificate (created in the Cloudflare dashboard).
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # Attachments + call recordings.
    client_max_body_size 50m;

    # ── OPTIONAL network-level org-IP lock for staff panels ──────────────────
    # The app also enforces an editable login-time allow-list. If you ALSO want a
    # hard network block, uncomment and list your office IPs.
    # location ~ ^/api/(admin|agent) {
    #     allow 203.0.113.0/24;   # your office range (placeholder)
    #     deny all;
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Everything (API + socket.io + /uploads + the SPA) -> the Node app on :5000.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;            # socket.io websocket upgrade
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;           # real visitor IP (from realip above)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;        # pairs with the app's trust-proxy setting
        proxy_read_timeout 300s;                           # long-lived sockets
    }
}
